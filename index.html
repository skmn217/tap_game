<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chicken Tap Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:sans-serif;
}

#titleScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#87ceeb;
}

#gameScreen{
display:none;
}

button{
font-size:20px;
padding:12px 24px;
border:none;
border-radius:10px;
background:#ffcc00;
}

.enemy{
position:absolute;
width:80px;
user-select:none;
touch-action:manipulation;
}
</style>
</head>

<body>

<!-- タイトル画面 -->
<div id="titleScreen">
<h1>🐔 Chicken Tap</h1>
<button onclick="startGame()">START</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen"></div>

<audio id="tapSound"
src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<script>
const game=document.getElementById("gameScreen");
const title=document.getElementById("titleScreen");
const sound=document.getElementById("tapSound");

let playing=false;
let spawnLoop;

/* ===== ゲーム開始 ===== */
function startGame(){
title.style.display="none";
game.style.display="block";
playing=true;
spawnEnemies();
}

/* ===== タイトルへ戻る ===== */
function backToTitle(){
playing=false;
clearInterval(spawnLoop);
game.innerHTML="";
game.style.display="none";
title.style.display="flex";
}

/* ===== 敵生成（2〜3体） ===== */
function spawnEnemies(){
spawnLoop=setInterval(()=>{
if(!playing) return;

const count=2+Math.floor(Math.random()*2);

for(let i=0;i<count;i++){
createEnemy();
}

},1200);
}

/* ===== 敵1体 ===== */
function createEnemy(){

const enemy=document.createElement("img");
enemy.src="chicken.png"; // ←画像名
enemy.className="enemy";

const startX=Math.random()*(window.innerWidth-80);

let y=-100;
let rotation=0;

enemy.style.left=startX+"px";
enemy.style.top=y+"px";

game.appendChild(enemy);

/* タップ（音のみ） */
enemy.onclick=()=>{
sound.currentTime=0;
sound.play();
enemy.remove();
};

/* 直線落下＋自転 */
const speed=3+Math.random()*2;
const spin=3+Math.random()*4;

function move(){
if(!playing){
enemy.remove();
return;
}

y+=speed;
rotation+=spin;

enemy.style.top=y+"px";
enemy.style.transform=`rotate(${rotation}deg)`;

if(y<window.innerHeight+100){
requestAnimationFrame(move);
}else{
enemy.remove();
}
}

move();
}

/* ===== 戻るボタン ===== */
const backBtn=document.createElement("button");
backBtn.textContent="タイトルへ戻る";
backBtn.style.position="absolute";
backBtn.style.top="10px";
backBtn.style.left="10px";
backBtn.onclick=backToTitle;
document.body.appendChild(backBtn);

</script>

</body>
</html>
